<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyson's Casting Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#1a1a18;color:#f5f4f0;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-size:16px;font-weight:500;}
.topbar-sub{font-size:12px;color:#888780;}
.badge-live{font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;background:#1D9E75;color:#fff;}
.container{max-width:720px;margin:0 auto;padding:20px 16px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat{background:#fff;border-radius:10px;padding:14px 16px;border:0.5px solid #e0dfd8;}
.stat-label{font-size:11px;color:#888780;margin-bottom:5px;}
.stat-val{font-size:22px;font-weight:500;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:999px;border:0.5px solid #ccc;background:#fff;color:#666;cursor:pointer;}
.filter-btn.active{background:#1a1a18;color:#f5f4f0;border-color:#1a1a18;}
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:16px 18px;cursor:pointer;transition:border-color 0.15s;}
.card:hover{border-color:#aaa;}
.card.expanded{border-color:#888;}
.card-top{display:flex;align-items:flex-start;gap:12px;}
.rank{font-size:11px;color:#aaa;min-width:18px;padding-top:2px;}
.card-info{flex:1;}
.card-title{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.4;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;}
.tag-ott{background:#EEEDFE;color:#3C3489;}
.tag-film{background:#E6F1FB;color:#0C447C;}
.tag-ad{background:#FAEEDA;color:#633806;}
.tag-short{background:#EAF3DE;color:#27500A;}
.tag-theatre{background:#FBEAF0;color:#72243E;}
.platform-tag{font-size:10px;color:#888;padding:2px 6px;border:0.5px solid #ddd;border-radius:4px;}
.dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.dot-new{background:#639922;}
.dot-applied{background:#378ADD;}
.dot-skip{background:#ccc;}
.expanded-body{margin-top:14px;padding-top:14px;border-top:0.5px solid #e0dfd8;display:none;}
.card.expanded .expanded-body{display:block;}
.snippet{font-size:13px;color:#666;line-height:1.6;margin-bottom:14px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a18;cursor:pointer;font-weight:500;text-decoration:none;display:inline-block;}
.btn:hover{background:#f5f4f0;}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.btn-primary:hover{background:#333;}
.btn-link{color:#185FA5;border-color:#B5D4F4;}
.btn-link:hover{background:#E6F1FB;}
.btn-danger{color:#A32D2D;border-color:#F7C1C1;}
.btn-danger:hover{background:#FCEBEB;}
.draft-box{background:#f5f4f0;border-radius:8px;padding:14px;margin-top:14px;display:none;}
.draft-label{font-size:11px;font-weight:500;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.draft-text{font-size:13px;color:#1a1a18;line-height:1.7;white-space:pre-wrap;}
.copy-btn{margin-top:10px;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}
.date-tag{font-size:10px;color:#aaa;}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Tyson's Casting Hub</div>
    <div class="topbar-sub">Auto-updated daily · Parvez Husain</div>
  </div>
  <span class="badge-live">● Live</span>
</div>

<div class="container">
  <div class="stats" style="margin-top:20px;">
    <div class="stat"><div class="stat-label">Found today</div><div class="stat-val" id="total-count">0</div></div>
    <div class="stat"><div class="stat-label">OTT / Film</div><div class="stat-val" id="ott-count">0</div></div>
    <div class="stat"><div class="stat-label">Applied</div><div class="stat-val" id="applied-count">0</div></div>
    <div class="stat"><div class="stat-label">Skipped</div><div class="stat-val" id="skipped-count">0</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
    <button class="filter-btn" onclick="filterCards('ott',this)">OTT / Web Series</button>
    <button class="filter-btn" onclick="filterCards('film',this)">Films</button>
    <button class="filter-btn" onclick="filterCards('ad',this)">Ads</button>
    <button class="filter-btn" onclick="filterCards('short',this)">Short / Other</button>
    <button class="filter-btn" onclick="filterCards('theatre',this)">Theatre</button>
  </div>

  <div class="cards" id="cardList"></div>
</div>

<script>
const PROFILE = {
  name: "Parvez Husain",
  stageName: "Tyson",
  age: 16,
  dob: "14 November 2009",
  height: "5'7\"",
  weight: "50 kg",
  gender: "Male",
  location: "Rampurhat, West Bengal",
  languages: "English, Hindi, Bengali",
  email: "andereshan@gmail.com",
  phone: "+91 9332977027",
  experience: "5+ years in VFX, CGI, 3D animation, and filmmaking",
  training: "Acting workshops by Pryesh Patel (ALH), Bollywood Networking Workshop by Ankit Jain",
  currentProject: "Currently directing and starring in my own short film 'TIME — the unknown gift'",
  strengths: "intense/brooding characters, comic relief, natural screen presence"
};

function generateEmail(audition) {
  const t = audition.type;
  const title = audition.title;
  const platform = audition.platform ? `(${audition.platform})` : "";
  const snippet = audition.snippet || "";

  const intro = `I am Parvez Husain, professionally known as Tyson — a ${PROFILE.age}-year-old male actor from ${PROFILE.location}. I am ${PROFILE.height} tall, ${PROFILE.weight}, and fluent in ${PROFILE.languages}.`;
  const training = `I have completed acting workshops under Pryesh Patel (ALH Audition Group) and the Bollywood Networking Workshop by Ankit Jain. ${PROFILE.currentProject}.`;
  const closing = `Please find my headshot and intro video attached. I am available for self-tape or in-person audition at your convenience.\n\nBest regards,\nParvez Husain (Tyson)\n${PROFILE.phone}\n${PROFILE.email}`;

  if (t === "ott") {
    return `Subject: Teen Male Actor Application — ${title} ${platform} | Parvez Husain (Tyson)

Dear Casting Team,

I am writing to apply for the teen male role in ${title} ${platform}.

${intro}

I bring a strong and natural on-screen presence — particularly suited for intense, brooding, and emotionally complex characters, as well as comic relief roles. ${PROFILE.experience}.

${training}

${closing}`;
  }

  if (t === "film") {
    return `Subject: Teen Male Actor — ${title} | Parvez Husain (Tyson)

Dear Casting Director,

I am applying for the teen male role in ${title}.

${intro}

I am drawn to character-driven, psychologically complex roles. My natural screen vibe leans intense and brooding — I can carry emotional weight without overacting. I am also naturally strong in comic relief. ${PROFILE.experience}.

${training}

${closing}`;
  }

  if (t === "ad") {
    return `Subject: Teen Male Actor — Commercial/Ad Application | Parvez Husain (Tyson)

Dear Casting Team,

I am applying for the teen male role in: ${title}.

${intro}

I am camera-comfortable, high energy, and experienced in front of the lens through years of self-directed filmmaking. I adapt quickly to direction and deliver clean takes efficiently.

${training}

${closing}`;
  }

  if (t === "theatre") {
    return `Subject: Teen Male Actor — Theatre Application | Parvez Husain (Tyson)

Dear Director,

I am applying for the teen male role in: ${title}.

${intro}

I connect deeply with emotionally complex, introspective characters. Theatre's demand for presence and spontaneity aligns with how I approach performance — raw and committed.

${training}

${closing}`;
  }

  return `Subject: Teen Male Actor Application — ${title} | Parvez Husain (Tyson)

Dear Team,

I am applying for the teen male role in: ${title}.

${intro}

${PROFILE.experience}. ${training}

${closing}`;
}

const typeLabel = {ott:'OTT / Web Series',film:'Feature Film',ad:'Ad / Commercial',short:'Short / Other',theatre:'Theatre'};
const tagClass = {ott:'tag-ott',film:'tag-film',ad:'tag-ad',short:'tag-short',theatre:'tag-theatre'};

let auditions = [];
let currentFilter = 'all';
let expandedId = null;
let statuses = {};

async function loadAuditions() {
  try {
    const res = await fetch('auditions.json?t=' + Date.now());
    auditions = await res.json();
    updateStats();
    renderCards();
  } catch(e) {
    document.getElementById('cardList').innerHTML = '<div class="empty">Could not load auditions. Try refreshing.</div>';
  }
}

function updateStats() {
  document.getElementById('total-count').textContent = auditions.length;
  document.getElementById('ott-count').textContent = auditions.filter(a=>a.type==='ott'||a.type==='film').length;
  document.getElementById('applied-count').textContent = Object.values(statuses).filter(s=>s==='applied').length;
  document.getElementById('skipped-count').textContent = Object.values(statuses).filter(s=>s==='skip').length;
}

function filterCards(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = currentFilter==='all' ? auditions : auditions.filter(a=>a.type===currentFilter);
  if(!filtered.length){list.innerHTML='<div class="empty">No auditions in this category.</div>';return;}
  list.innerHTML = filtered.map(a=>{
    const st = statuses[a.id]||'new';
    const isExpanded = expandedId === a.id;
    const draft = isExpanded ? generateEmail(a) : '';
    return `<div class="card ${isExpanded?'expanded':''}" id="card-${a.id}" onclick="toggleCard(event,${a.id})">
      <div class="card-top">
        <div class="rank">${a.rank}</div>
        <div class="card-info">
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <span class="tag ${tagClass[a.type]||'tag-short'}">${typeLabel[a.type]||'Other'}</span>
            ${a.platform?`<span class="platform-tag">${a.platform}</span>`:''}
            <span class="date-tag">${a.date||''}</span>
          </div>
        </div>
        <div class="dot ${st==='new'?'dot-new':st==='applied'?'dot-applied':'dot-skip'}"></div>
      </div>
      ${isExpanded?`
      <div class="expanded-body">
        <div class="snippet">${a.snippet||''}</div>
        <div class="actions">
          <a href="${a.link}" class="btn btn-link" target="_blank" onclick="event.stopPropagation()">View source</a>
          <button class="btn" onclick="markStatus(event,${a.id},'applied')">Mark applied</button>
          <button class="btn btn-danger" onclick="markStatus(event,${a.id},'skip')">Skip</button>
        </div>
        <div class="draft-box" style="display:block;">
          <div class="draft-label">Email draft — copy and send from Gmail</div>
          <div class="draft-text" id="draft-text-${a.id}">${draft}</div>
          <button class="btn copy-btn" onclick="copyDraft(event,${a.id})">Copy draft</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
  updateStats();
}

function toggleCard(e, id) {
  if(e.target.classList.contains('btn') || e.target.tagName === 'A') return;
  expandedId = expandedId === id ? null : id;
  renderCards();
}

function copyDraft(e, id) {
  e.stopPropagation();
  const textEl = document.getElementById('draft-text-'+id);
  if(textEl) navigator.clipboard.writeText(textEl.textContent).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = textEl.textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  e.target.textContent = 'Copied!';
  setTimeout(()=>e.target.textContent='Copy draft', 1500);
}

function markStatus(e, id, status) {
  e.stopPropagation();
  statuses[id] = status;
  renderCards();
}

loadAuditions();
</script>
</body>
</html>
