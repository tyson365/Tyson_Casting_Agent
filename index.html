<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyson's Casting Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d14;color:#f0f0f5;min-height:100vh;}
.topbar{background:rgba(13,13,20,0.95);border-bottom:1px solid rgba(255,255,255,0.07);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:28px;height:28px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;}
.topbar-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:0.3px;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.35);margin-top:1px;}
.badge-live{font-size:11px;font-weight:500;padding:4px 12px;border-radius:999px;background:rgba(29,158,117,0.15);color:#1D9E75;border:1px solid rgba(29,158,117,0.3);}
.hero{padding:40px 24px 24px;max-width:800px;margin:0 auto;}
.hero-title{font-size:28px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-0.5px;}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.4);}
.container{max-width:800px;margin:0 auto;padding:0 24px 40px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.07);transition:border-color 0.2s;}
.stat:hover{border-color:rgba(124,58,237,0.4);}
.stat-label{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-val{font-size:24px;font-weight:700;color:#fff;}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;font-weight:500;}
.filter-btn:hover{border-color:rgba(255,255,255,0.25);color:#fff;}
.filter-btn.active{background:rgba(124,58,237,0.2);border-color:#7c3aed;color:#c4b5fd;}
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all 0.2s;}
.card:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);}
.card.expanded{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.35);}
.card-top{display:flex;align-items:flex-start;gap:14px;}
.rank{font-size:11px;color:rgba(255,255,255,0.2);min-width:18px;padding-top:3px;font-weight:600;}
.card-info{flex:1;}
.card-title{font-size:14px;font-weight:600;color:#f0f0f5;margin-bottom:6px;line-height:1.4;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;letter-spacing:0.03em;}
.tag-ott{background:rgba(124,58,237,0.2);color:#c4b5fd;border:1px solid rgba(124,58,237,0.3);}
.tag-film{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);}
.tag-ad{background:rgba(245,158,11,0.15);color:#fcd34d;border:1px solid rgba(245,158,11,0.25);}
.tag-short{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25);}
.tag-theatre{background:rgba(236,72,153,0.15);color:#f9a8d4;border:1px solid rgba(236,72,153,0.25);}
.platform-tag{font-size:10px;color:rgba(255,255,255,0.3);padding:2px 7px;border:1px solid rgba(255,255,255,0.08);border-radius:999px;}
.date-tag{font-size:10px;color:rgba(255,255,255,0.2);}
.dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.dot-new{background:#1D9E75;box-shadow:0 0 6px rgba(29,158,117,0.5);}
.dot-applied{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,0.5);}
.dot-skip{background:rgba(255,255,255,0.15);}
.expanded-body{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);}
.snippet{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:16px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.btn{font-size:12px;padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-weight:500;text-decoration:none;display:inline-block;transition:all 0.2s;}
.btn:hover{background:rgba(255,255,255,0.07);color:#fff;}
.btn-primary{background:rgba(124,58,237,0.25);border-color:rgba(124,58,237,0.5);color:#c4b5fd;}
.btn-primary:hover{background:rgba(124,58,237,0.4);}
.btn-link{color:#93c5fd;border-color:rgba(59,130,246,0.3);}
.btn-link:hover{background:rgba(59,130,246,0.1);}
.btn-danger{color:#fca5a5;border-color:rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.1);}
.btn-success{color:#6ee7b7;border-color:rgba(16,185,129,0.3);}
.btn-success:hover{background:rgba(16,185,129,0.1);}
.draft-box{background:rgba(0,0,0,0.3);border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,0.07);}
.draft-label{font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.08em;}
.draft-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.8;white-space:pre-wrap;font-family:'Courier New',monospace;}
.copy-btn{margin-top:12px;}
.empty{text-align:center;padding:3rem;color:rgba(255,255,255,0.2);font-size:14px;}
.divider{height:1px;background:rgba(255,255,255,0.05);margin:20px 0;}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr);}.hero-title{font-size:22px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">T</div>
    <div>
      <div class="topbar-title">Tyson's Casting Hub</div>
      <div class="topbar-sub">Auto-updated daily · Parvez Husain</div>
    </div>
  </div>
  <span class="badge-live">● Live</span>
</div>

<div class="hero">
  <div class="hero-title">Today's Auditions</div>
  <div class="hero-sub">Ranked by project size · Teen male roles · India</div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-label">Found today</div><div class="stat-val" id="total-count">0</div></div>
    <div class="stat"><div class="stat-label">OTT / Film</div><div class="stat-val" id="ott-count">0</div></div>
    <div class="stat"><div class="stat-label">Applied</div><div class="stat-val" id="applied-count">0</div></div>
    <div class="stat"><div class="stat-label">Skipped</div><div class="stat-val" id="skipped-count">0</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
    <button class="filter-btn" onclick="filterCards('ott',this)">OTT / Web Series</button>
    <button class="filter-btn" onclick="filterCards('film',this)">Films</button>
    <button class="filter-btn" onclick="filterCards('ad',this)">Ads</button>
    <button class="filter-btn" onclick="filterCards('short',this)">Short / Other</button>
    <button class="filter-btn" onclick="filterCards('theatre',this)">Theatre</button>
  </div>

  <div class="cards" id="cardList"></div>
</div>

<script>
const PROFILE = {
  name: "Parvez Husain",
  stageName: "Tyson",
  age: 16,
  height: "5'7\"",
  weight: "50 kg",
  location: "Rampurhat, West Bengal",
  languages: "English, Hindi, Bengali",
  email: "andereshan@gmail.com",
  phone: "+91 9332977027",
  experience: "5+ years in VFX, CGI, 3D animation, and filmmaking",
  training: "Acting workshops by Pryesh Patel (ALH Audition Group) and Bollywood Networking Workshop by Ankit Jain",
  currentProject: "Currently directing and starring in my own short film 'TIME — the unknown gift'"
};

function generateEmail(a) {
  const t = a.type;
  const title = a.title;
  const platform = a.platform ? ` (${a.platform})` : "";
  const base = `I am Parvez Husain, professionally known as Tyson — a ${PROFILE.age}-year-old male actor from ${PROFILE.location}. I stand at ${PROFILE.height}, weigh ${PROFILE.weight}, and am fluent in ${PROFILE.languages}.`;
  const training = `I have completed acting workshops under Pryesh Patel (ALH Audition Group) and the Bollywood Networking Workshop by Ankit Jain. ${PROFILE.currentProject}.`;
  const closing = `Please find my headshot and intro video attached. I am available for a self-tape or in-person audition at your convenience.\n\nBest regards,\nParvez Husain (Tyson)\n${PROFILE.phone}\n${PROFILE.email}`;

  if(t==='ott') return `Subject: Teen Male Actor Application — ${title}${platform} | Parvez Husain (Tyson)\n\nDear Casting Team,\n\nI am writing to apply for the teen male role in ${title}${platform}.\n\n${base}\n\nI bring strong on-screen presence suited for intense, emotionally complex characters as well as natural comic relief. ${PROFILE.experience}.\n\n${training}\n\n${closing}`;

  if(t==='film') return `Subject: Teen Male Actor — ${title} | Parvez Husain (Tyson)\n\nDear Casting Director,\n\nI am applying for the teen male role in ${title}.\n\n${base}\n\nI am drawn to psychologically complex, character-driven roles. My natural screen presence leans intense and brooding — I carry emotional weight without overacting. I am equally strong in comic relief.\n\n${PROFILE.experience}.\n\n${training}\n\n${closing}`;

  if(t==='ad') return `Subject: Teen Male Actor — Commercial Application | Parvez Husain (Tyson)\n\nDear Casting Team,\n\nI am applying for the teen male role in: ${title}.\n\n${base}\n\nI am camera-comfortable, high energy, and experienced in front of the lens through years of self-directed filmmaking. I adapt quickly to direction and deliver clean takes efficiently.\n\n${training}\n\n${closing}`;

  if(t==='theatre') return `Subject: Teen Male Actor — Theatre Application | Parvez Husain (Tyson)\n\nDear Director,\n\nI am applying for the teen male role in: ${title}.\n\n${base}\n\nTheatre's demand for presence and spontaneity aligns with how I approach performance — committed and raw. I connect deeply with emotionally complex, introspective characters.\n\n${training}\n\n${closing}`;

  return `Subject: Teen Male Actor Application — ${title} | Parvez Husain (Tyson)\n\nDear Team,\n\nI am applying for the teen male role in: ${title}.\n\n${base}\n\n${PROFILE.experience}.\n\n${training}\n\n${closing}`;
}

const typeLabel={ott:'OTT / Web Series',film:'Feature Film',ad:'Ad / Commercial',short:'Short / Other',theatre:'Theatre'};
const tagClass={ott:'tag-ott',film:'tag-film',ad:'tag-ad',short:'tag-short',theatre:'tag-theatre'};

let auditions=[];
let currentFilter='all';
let expandedId=null;
let statuses={};

async function loadAuditions(){
  try{
    const res=await fetch('auditions.json?t='+Date.now());
    auditions=await res.json();
    updateStats();
    renderCards();
  }catch(e){
    document.getElementById('cardList').innerHTML='<div class="empty">Could not load auditions. Try refreshing.</div>';
  }
}

function updateStats(){
  document.getElementById('total-count').textContent=auditions.length;
  document.getElementById('ott-count').textContent=auditions.filter(a=>a.type==='ott'||a.type==='film').length;
  document.getElementById('applied-count').textContent=Object.values(statuses).filter(s=>s==='applied').length;
  document.getElementById('skipped-count').textContent=Object.values(statuses).filter(s=>s==='skip').length;
}

function filterCards(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards(){
  const list=document.getElementById('cardList');
  const filtered=currentFilter==='all'?auditions:auditions.filter(a=>a.type===currentFilter);
  if(!filtered.length){list.innerHTML='<div class="empty">No auditions in this category.</div>';return;}
  list.innerHTML=filtered.map(a=>{
    const st=statuses[a.id]||'new';
    const isExp=expandedId===a.id;
    return `<div class="card ${isExp?'expanded':''}" onclick="toggleCard(event,${a.id})">
      <div class="card-top">
        <div class="rank">${a.rank}</div>
        <div class="card-info">
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <span class="tag ${tagClass[a.type]||'tag-short'}">${typeLabel[a.type]||'Other'}</span>
            ${a.platform?`<span class="platform-tag">${a.platform}</span>`:''}
            <span class="date-tag">${a.date||''}</span>
          </div>
        </div>
        <div class="dot ${st==='new'?'dot-new':st==='applied'?'dot-applied':'dot-skip'}"></div>
      </div>
      ${isExp?`<div class="expanded-body">
        <div class="snippet">${a.snippet||''}</div>
        <div class="actions">
          <a href="${a.link}" class="btn btn-link" target="_blank" onclick="event.stopPropagation()">View source</a>
          <button class="btn btn-success" onclick="markStatus(event,${a.id},'applied')">Mark applied</button>
          <button class="btn btn-danger" onclick="markStatus(event,${a.id},'skip')">Skip</button>
        </div>
        <div class="draft-box">
          <div class="draft-label">Email draft — copy and send from Gmail</div>
          <div class="draft-text">${generateEmail(a)}</div>
          <button class="btn btn-primary copy-btn" onclick="copyDraft(event,${a.id})">Copy draft</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
  updateStats();
}

function toggleCard(e,id){
  if(e.target.classList.contains('btn')||e.target.tagName==='A')return;
  expandedId=expandedId===id?null:id;
  renderCards();
}

function copyDraft(e,id){
  e.stopPropagation();
  const a=auditions.find(x=>x.id===id);
  if(!a)return;
  const text=generateEmail(a);
  navigator.clipboard.writeText(text).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  e.target.textContent='Copied!';
  setTimeout(()=>e.target.textContent='Copy draft',1500);
}

function markStatus(e,id,status){
  e.stopPropagation();
  statuses[id]=status;
  renderCards();
}

loadAuditions();
</script>
</body>
</html>
