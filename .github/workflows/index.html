<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyson's Casting Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;}
.topbar{background:#1a1a18;color:#f5f4f0;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-size:16px;font-weight:500;}
.topbar-sub{font-size:12px;color:#888780;}
.badge-live{font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;background:#1D9E75;color:#fff;}
.container{max-width:720px;margin:0 auto;padding:20px 16px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat{background:#fff;border-radius:10px;padding:14px 16px;border:0.5px solid #e0dfd8;}
.stat-label{font-size:11px;color:#888780;margin-bottom:5px;}
.stat-val{font-size:22px;font-weight:500;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:999px;border:0.5px solid #ccc;background:#fff;color:#666;cursor:pointer;}
.filter-btn.active{background:#1a1a18;color:#f5f4f0;border-color:#1a1a18;}
.cards{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:16px 18px;cursor:pointer;transition:border-color 0.15s;}
.card:hover{border-color:#aaa;}
.card.expanded{border-color:#888;}
.card-top{display:flex;align-items:flex-start;gap:12px;}
.rank{font-size:11px;color:#aaa;min-width:18px;padding-top:2px;}
.card-info{flex:1;}
.card-title{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.4;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;}
.tag-ott{background:#EEEDFE;color:#3C3489;}
.tag-film{background:#E6F1FB;color:#0C447C;}
.tag-ad{background:#FAEEDA;color:#633806;}
.tag-short{background:#EAF3DE;color:#27500A;}
.dot{width:7px;height:7px;border-radius:50%;margin-top:4px;}
.dot-new{background:#639922;}
.dot-applied{background:#378ADD;}
.dot-skip{background:#ccc;}
.expanded-body{margin-top:14px;padding-top:14px;border-top:0.5px solid #e0dfd8;display:none;}
.card.expanded .expanded-body{display:block;}
.snippet{font-size:13px;color:#666;line-height:1.6;margin-bottom:14px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a18;cursor:pointer;font-weight:500;text-decoration:none;display:inline-block;}
.btn:hover{background:#f5f4f0;}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18;}
.btn-primary:hover{background:#333;}
.btn-link{color:#185FA5;border-color:#B5D4F4;}
.btn-link:hover{background:#E6F1FB;}
.btn-danger{color:#A32D2D;border-color:#F7C1C1;}
.btn-danger:hover{background:#FCEBEB;}
.draft-box{background:#f5f4f0;border-radius:8px;padding:14px;margin-top:14px;display:none;}
.draft-label{font-size:11px;font-weight:500;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.draft-text{font-size:13px;color:#1a1a18;line-height:1.7;white-space:pre-wrap;}
.copy-btn{margin-top:10px;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Tyson's Casting Hub</div>
    <div class="topbar-sub">Auto-updated daily · Parvez Husain</div>
  </div>
  <span class="badge-live">● Live</span>
</div>

<div class="container">
  <div class="stats" style="margin-top:20px;">
    <div class="stat"><div class="stat-label">Found today</div><div class="stat-val" id="total-count">0</div></div>
    <div class="stat"><div class="stat-label">OTT / Film</div><div class="stat-val" id="ott-count">0</div></div>
    <div class="stat"><div class="stat-label">Applied</div><div class="stat-val" id="applied-count">0</div></div>
    <div class="stat"><div class="stat-label">Skipped</div><div class="stat-val" id="skipped-count">0</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
    <button class="filter-btn" onclick="filterCards('ott',this)">OTT / Web Series</button>
    <button class="filter-btn" onclick="filterCards('film',this)">Films</button>
    <button class="filter-btn" onclick="filterCards('ad',this)">Ads</button>
    <button class="filter-btn" onclick="filterCards('short',this)">Short / Other</button>
  </div>

  <div class="cards" id="cardList"></div>
</div>

<script>
const GITHUB_USER = 'tyson365';
const GITHUB_REPO = 'Tyson_Casting_Agent';
const WORKFLOW_NAME = 'Daily Casting Scraper';

const emailDrafts = {
  ott: (title) => `Subject: Application — ${title} | Tyson (Parvez Husain)\n\nDear Casting Team,\n\nI'm Tyson, a 16-year-old actor based in West Bengal with strong on-camera presence and 5+ years in filmmaking. I'm fluent in English, Hindi, and Bengali.\n\nI'm applying for the role listed in: ${title}. I've attached my headshot and intro video. I'm currently directing and starring in my own short film, which has deepened my understanding of character-driven storytelling.\n\nI'd be glad to submit a self-tape.\n\nWarm regards,\nParvez Husain (Tyson)\n+91 XXXXXXXXXX`,
  film: (title) => `Subject: Teen Actor Application — ${title} | Parvez Husain\n\nDear Casting Director,\n\nI'm Tyson, a 16-year-old actor from West Bengal with a natural intensity and strong screen presence. I'm drawn to character-driven stories and psychologically complex roles.\n\nApplying for: ${title}. Headshot and intro reel attached.\n\nRegards,\nParvez Husain (Tyson)`,
  ad: (title) => `Subject: Teen Actor — ${title} | Tyson\n\nHi,\n\nI'm Tyson, a 16-year-old actor from West Bengal. Camera-comfortable, high energy, and available for shoots.\n\nApplying for: ${title}. Headshot attached.\n\nTyson (Parvez Husain)`,
  short: (title) => `Subject: Actor Application — ${title} | Parvez Husain\n\nDear Team,\n\nI'm Tyson, a 16-year-old actor and filmmaker from West Bengal. I'm passionate about collaborative storytelling and would love to be part of your project.\n\nApplying for: ${title}. Headshot and intro video attached.\n\nBest,\nParvez Husain (Tyson)`,
};

const typeLabel = {ott:'OTT / Web Series',film:'Feature Film',ad:'Ad / Commercial',short:'Short / Other'};
const tagClass = {ott:'tag-ott',film:'tag-film',ad:'tag-ad',short:'tag-short'};

let auditions = [];
let currentFilter = 'all';
let expandedId = null;
let draftVisible = {};
let statuses = {};

async function loadAuditions() {
  try {
    const runsRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/actions/runs?per_page=5`);
    const runsData = await runsRes.json();
    const successRun = runsData.workflow_runs?.find(r => r.conclusion === 'success');
    if (!successRun) { showError('No successful scraper run found yet.'); return; }
    const artRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/actions/runs/${successRun.id}/artifacts`);
    const artData = await artRes.json();
    const artifact = artData.artifacts?.find(a => a.name === 'auditions');
    if (!artifact) { showError('No auditions artifact found.'); return; }
    document.getElementById('cardList').innerHTML = '<div class="empty">Loading auditions...</div>';
    showError('GitHub API requires auth to download artifacts directly. Loading last known data...');
    loadFallback();
  } catch(e) {
    loadFallback();
  }
}

function loadFallback() {
  auditions = [
    {id:1,rank:1,title:"Casting call for web series — fresh faces wanted",type:"ott",snippet:"Casting for an upcoming web series looking for fresh faces and talented actors ready to bring powerful stories to life.",link:"https://www.instagram.com/p/DWUGRH4jxH-/"},
    {id:2,rank:2,title:"Mukesh Chhabra Casting — boys age 16–22, web series",type:"ott",snippet:"MCCC looking for boys age 16–22 for an upcoming web series.",link:"https://www.facebook.com/MukeshChhabraCC/posts/1318579866964351/"},
    {id:3,rank:3,title:"Casting for JioHotstar web series — boys 16–22",type:"ott",snippet:"Requirement for web series — boys age 16–22. Interested actors share your profile.",link:"https://www.facebook.com/gokul.krishna.373285/posts/2687342918266886/"},
    {id:4,rank:4,title:"Netflix project casting — April 2026 shoot",type:"ott",snippet:"MJ Films casting for an upcoming Netflix project shooting April 2026.",link:"https://www.instagram.com/p/DVIUxwjiQ11/"},
    {id:5,rank:5,title:"Talentrack — teenager actor auditions India",type:"ott",snippet:"Looking for teenager actors in India. Get updates about latest acting jobs and casting calls.",link:"https://www.talentrack.in/actor-audition-in-india--TEENAGER-ACTOR"},
    {id:6,rank:6,title:"HNJ Films — auditions 2026 officially open",type:"film",snippet:"Male artists age 18–50. Acting experience mandatory. Share a monologue video.",link:"https://www.instagram.com/p/DS-OoQxDxFE/"},
    {id:7,rank:7,title:"Acmodasi — casting for a movie, teen actor",type:"film",snippet:"Casting for a movie. First time auditioning. Talented and passionate young actor.",link:"https://www.acmodasi.in/auditions/for_teens/"},
    {id:8,rank:8,title:"Modelzworld — verified casting calls India",type:"ad",snippet:"All casting calls 100% verified. Actor and model casting in India. No charges for applying.",link:"https://modelzworld.com/casting-calls-2/"},
    {id:9,rank:9,title:"Castkro — acting auditions and casting India",type:"short",snippet:"Free platform connecting casting directors with talented actors from Mumbai, Delhi, and nationwide.",link:"https://www.castkro.com/"},
    {id:10,rank:10,title:"Acmodasi — auditions in tv series for teens",type:"short",snippet:"Casting calls for teens in TV series are increasingly popular as producers look for the perfect actors.",link:"https://www.acmodasi.in/auditions/in_tv_series-for_teens/"},
  ];
  updateStats();
  renderCards();
}

function showError(msg) {
  console.log(msg);
}

function updateStats() {
  document.getElementById('total-count').textContent = auditions.length;
  document.getElementById('ott-count').textContent = auditions.filter(a=>a.type==='ott'||a.type==='film').length;
  document.getElementById('applied-count').textContent = Object.values(statuses).filter(s=>s==='applied').length;
  document.getElementById('skipped-count').textContent = Object.values(statuses).filter(s=>s==='skip').length;
}

function filterCards(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const list = document.getElementById('cardList');
  const filtered = currentFilter==='all' ? auditions : auditions.filter(a=>a.type===currentFilter);
  if(!filtered.length){list.innerHTML='<div class="empty">No auditions in this category.</div>';return;}
  list.innerHTML = filtered.map(a=>{
    const st = statuses[a.id]||'new';
    return `<div class="card ${expandedId===a.id?'expanded':''}" id="card-${a.id}" onclick="toggleCard(${a.id})">
      <div class="card-top">
        <div class="rank">${a.rank}</div>
        <div class="card-info">
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <span class="tag ${tagClass[a.type]}">${typeLabel[a.type]}</span>
          </div>
        </div>
        <div class="dot ${st==='new'?'dot-new':st==='applied'?'dot-applied':'dot-skip'}"></div>
      </div>
      <div class="expanded-body">
        <div class="snippet">${a.snippet}</div>
        <div class="actions">
          <button class="btn btn-primary" onclick="showDraft(event,${a.id})">Draft email</button>
          <a href="${a.link}" class="btn btn-link" target="_blank" onclick="event.stopPropagation()">View source</a>
          <button class="btn" onclick="markStatus(event,${a.id},'applied')">Mark applied</button>
          <button class="btn btn-danger" onclick="markStatus(event,${a.id},'skip')">Skip</button>
        </div>
        <div class="draft-box" id="draft-${a.id}">
          <div class="draft-label">Email draft — copy and send from Gmail</div>
          <div class="draft-text" id="draft-text-${a.id}"></div>
          <button class="btn copy-btn" onclick="copyDraft(event,${a.id})">Copy draft</button>
        </div>
      </div>
    </div>`;
  }).join('');
  Object.keys(draftVisible).forEach(id=>{
    if(draftVisible[id]){
      const d=document.getElementById('draft-'+id);
      if(d)d.style.display='block';
    }
  });
  updateStats();
}

function toggleCard(id) {
  expandedId = expandedId===id ? null : id;
  renderCards();
}

function showDraft(e,id) {
  e.stopPropagation();
  draftVisible[id]=true;
  const a=auditions.find(x=>x.id===id);
  const textEl=document.getElementById('draft-text-'+id);
  if(textEl&&a) textEl.textContent=(emailDrafts[a.type]||emailDrafts.short)(a.title);
  const d=document.getElementById('draft-'+id);
  if(d)d.style.display='block';
}

function copyDraft(e,id) {
  e.stopPropagation();
  const textEl=document.getElementById('draft-text-'+id);
  if(textEl) navigator.clipboard.writeText(textEl.textContent).catch(()=>{});
  e.target.textContent='Copied!';
  setTimeout(()=>e.target.textContent='Copy draft',1500);
}

function markStatus(e,id,status) {
  e.stopPropagation();
  statuses[id]=status;
  renderCards();
}

loadAuditions();
</script>
</body>
</html>
